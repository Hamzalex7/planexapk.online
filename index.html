        ];

        let currentActiveGame = null;
        let currentCategory = 'All';

        const gameGrid = document.getElementById('gameGrid');
        const heroSlider = document.getElementById('heroSlider');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchContainer = document.getElementById('searchContainer');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');
        const menuBtn = document.getElementById('menuBtn');

        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                htmlEl.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                htmlEl.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }
        applyTheme();

        themeToggleBtn.addEventListener('click', () => {
            htmlEl.classList.toggle('dark');
            localStorage.setItem('theme', htmlEl.classList.contains('dark') ? 'dark' : 'light');
            applyTheme();
        });

        function initSlider() {
            const sliderGames = GAMES_DATA.slice(0, 12);
            heroSlider.innerHTML = sliderGames.map((game, idx) => `
                <div class="slide ${idx === 0 ? 'active' : ''}" style="background: url('${game.thumbnail}') center/cover no-repeat;">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <span class="text-[10px] font-black uppercase tracking-widest" style="color: ${CATEGORY_ACCENT[game.category] || '#00f3ff'}">${game.category}</span>
                        <h2 class="text-2xl md:text-3xl font-bold text-white mb-2">${game.title}</h2>
                        <button onclick="openModal('${game.id}')" class="px-6 py-2 bg-white text-black text-xs font-bold rounded-full hover:scale-105 transition-transform">VIEW GAME</button>
                    </div>
                </div>
            `).join('');

            let currentSlide = 0;
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 4000);
        }

        function renderGames(filter = '') {
            if (!gameGrid) return;
            gameGrid.classList.add('vertical-list');

            const filtered = GAMES_DATA.filter(g => {
                const matchesSearch = g.title.toLowerCase().includes(filter.toLowerCase());
                const matchesCategory = currentCategory === 'All' || g.category === currentCategory;
                return matchesSearch && matchesCategory;
            });

            gameGrid.innerHTML = filtered.length ? '' : '<div class="py-20 text-center text-gray-500 dark:text-white/20 font-bold uppercase tracking-widest text-sm">No results found</div>';

            filtered.forEach((game, idx) => {
                const accent = CATEGORY_ACCENT[game.category] || '#00f3ff';
                const card = document.createElement('div');
                card.className = 'fw-card';
                card.innerHTML = `
                    <div class="fw-left">
                        <div class="fw-thumb">
                            <img src="${game.thumbnail}" alt="${game.title} Mod Unlocked" decoding="async" loading="lazy">
                            <div class="fw-rating">★ ${game.rating}</div>
                        </div>
                        <div class="card-content-wrapper">
                            <div class="fw-meta">
                                <span class="fw-category" style="color: ${accent};">${game.category}</span>
                                <h3 class="fw-title">${game.title}</h3>
                            </div>
                            <div class="fw-download-container">
                                <button onclick="openModal('${game.id}')" class="fw-download-btn">
                                    Download
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                gameGrid.appendChild(card);
            });
        }

        function openModal(gameId) {
            const game = GAMES_DATA.find(g => g.id === gameId);
            if (!game) return;
            const accent = CATEGORY_ACCENT[game.category] || '#00f3ff';
            const pulseClass = (accent === '#ff007f') ? 'animate-pulse-pink' : 'animate-pulse-cyan';

            const modalInner = modalContent.parentElement; 
            modalInner.className = "relative w-full max-w-sm rounded-3xl overflow-hidden animate-spring";
            modalInner.style.backgroundColor = "#1a1a1a"; 
            modalInner.style.border = "1px solid rgba(255, 255, 255, 0.1)";

            modalContent.innerHTML = `
                <div class="relative h-48 overflow-hidden">
                    <img src="${game.thumbnail}" alt="${game.title} Mod Unlocked" class="w-full h-full object-cover" decoding="async" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#1a1a1a] to-transparent"></div>
                    <div class="absolute top-3 right-3 z-20 bg-black/50 backdrop-blur-md px-2 py-0.5 rounded-[10px] border border-white/10">
                         <span class="text-[10px] font-bold text-violet-400">MOD</span>
                    </div>
                    
                    <button onclick="closeModal()" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-black/40 backdrop-blur-md flex items-center justify-center text-white" aria-label="Close modal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="p-6 text-center relative max-h-[60vh] overflow-y-auto" style="scrollbar-width: none;">
                    
                    <div id="modal-step-1">
                        <h2 class="text-2xl font-bold mb-2 text-white">${game.title}</h2>
                        <p class="text-white/60 text-sm mb-6">Select your device to start download</p>
                        <div class="space-y-3">
                            <button onclick="startGenerator('${game.id}', 'iOS')" class="block w-full py-3 rounded-2xl font-bold flex items-center justify-center gap-3 transition-transform active:scale-95 ${pulseClass}" style="background-color: ${accent}; color: #1a1a1a;">
                                 <svg width="18" height="18" viewBox="0 0 384 512" fill="#1a1a1a"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                                Download for iOS
                            </button>

                            <button onclick="startGenerator('${game.id}', 'Android')" class="block w-full py-3 rounded-2xl font-bold flex items-center justify-center gap-3 transition-transform active:scale-95 ${pulseClass}" style="background-color: ${accent}; color: #1a1a1a;">
                                <img src="https://i.ibb.co/jPKnqR6K/android.png" alt="Android" style="width:20px; height:20px; object-fit: contain; filter: brightness(0.1);" />

                            </button>
                        </div>
                        <p class="mt-6 text-[10px] uppercase tracking-[0.3em] text-white/30 font-bold">Fast & Secure</p>
                    </div>
                    
                    <div class="mt-8 pt-8 border-t border-white/5 text-left">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-1.5 h-1.5 rounded-full bg-violet-500 animate-pulse"></span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Recent Activity</span>
                        </div>
                        <div id="comments-list" class="space-y-4"></div>
                    </div>

                </div>
            `;
            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            startFakeComments();
        }

        function startGenerator(gameId, platform) {
            currentActiveGame = GAMES_DATA.find(g => g.id === gameId);
            
            // كنسدو المربع ديال اللعبة
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
            
            // كنطلعو اللوكر نيشان
            showLocker();
        }

        function showLocker() {
            const lockerUrl = currentActiveGame ? currentActiveGame.cpa : 'about:blank';
            document.getElementById('locker-iframe').src = lockerUrl;
            document.getElementById('locker-overlay').classList.add('active');
        }

        function closeLocker(event) {
            document.getElementById('locker-overlay').classList.remove('active');
            setTimeout(() => {
                document.getElementById('locker-iframe').src = 'about:blank';
            }, 300);
        }

        function startFakeComments() {
            const list = document.getElementById('comments-list');
            if(!list) return;
            
            // كنبداو خاويين
            list.innerHTML = ""; 
            
            function add() {
                const listCheck = document.getElementById('comments-list');
                if(!listCheck) return; 
                const name = NAMES[Math.floor(Math.random() * NAMES.length)];
                const msg = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
                const div = document.createElement('div');
                div.className = "flex items-start gap-3 animate__animated animate__fadeInUp";
                div.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center font-bold text-xs text-slate-400 border border-white/5">${name[0]}</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-0.5"><span class="text-xs font-bold text-white">${name}</span><span class="text-[9px] text-green-500 font-mono">VERIFIED</span></div>
                        <p class="text-[10px] text-slate-400">${msg}</p>
                    </div>`;
                listCheck.prepend(div);
                
                // كنخليو غير تعليق واحد لي كيبان باش يجي داكشي طبيعي
                if(listCheck.children.length > 1) {
                    listCheck.lastChild.remove();
                }
            }
            
            if(window.comInt) clearInterval(window.comInt);
            // درنا 6000 (يعني 6 ثواني) باش كل 6 ثواني يبان تعليق جديد بوحدو
            window.comInt = setInterval(add, 6000); 
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
            if(window.comInt) clearInterval(window.comInt);
        }

        searchBtn.addEventListener('click', () => {
            searchContainer.classList.toggle('opacity-0');
            searchContainer.classList.toggle('h-0');
            searchContainer.classList.toggle('h-16');
            if (!searchContainer.classList.contains('opacity-0')) searchInput.focus();
        });

        searchInput.addEventListener('input', (e) => renderGames(e.target.value));
        modalClose.addEventListener('click', closeModal);
        menuBtn.addEventListener('click', (e) => { e.stopPropagation(); menuContainer.classList.toggle('hidden'); });
        document.addEventListener('click', () => menuContainer.classList.add('hidden'));

        let lastScrollY = window.scrollY;
        window.addEventListener('scroll', () => {
            header.style.transform = (window.scrollY > lastScrollY && window.scrollY > 80) ? 'translateY(-100%)' : 'translateY(0)';
            lastScrollY = window.scrollY;
        });

        function initFilters() {
            if (!filterContainer) return;
            const uniqueCats = [...new Set(GAMES_DATA.map(g => g.category))].sort();
            const categories = ['All', ...uniqueCats];

            filterContainer.innerHTML = categories.map(cat => `
                <button class="filter-btn ${cat === 'All' ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
            `).join('');
        }

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.textContent === cat) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderGames(searchInput.value);
        };

        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        initFilters();
        initSlider();
        renderGames();
    </script>
